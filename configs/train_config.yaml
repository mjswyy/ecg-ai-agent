# ECG Models — Training Configuration

# Hardware
device: "auto"  # 自动检测: npu > cuda > cpu / Auto-detect: npu > cuda > cpu
mixed_precision: true  # 支持 CUDA / Ascend NPU
gradient_checkpointing: false

# Data
data_dir: "/cache/data"  # ModelArts 本地缓存路径 / Local cache path

# Contrastive pretraining (SimCLR)
contrastive:
  batch_size: 256
  epochs: 100
  temperature: 0.07
  lr: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 5

# Multi-label fine-tuning
multilabel:
  batch_size: 128
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 5
  early_stopping_patience: 10
  log_interval: 50

# Optimizer
optimizer:
  name: "adamw"
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Loss (options: asymmetric, focal)
loss: "asymmetric"

# Model checkpointing
checkpoint:
  save_dir: "/cache/output"  # ModelArts 自动同步到 OBS
  save_best: true

# OBS 对象存储配置 / OBS Object Storage Config
obs:
  bucket: "obs://your-bucket/ecg-ai-agent/"
  data_remote: "obs://your-bucket/ecg-ai-agent/data/"
  output_remote: "obs://your-bucket/ecg-ai-agent/outputs/"
